<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}건설안전 뉴스레터{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --toss-blue: #3182F6;
      --toss-blue-light: #EBF3FE;
      --toss-blue-dark: #1B64DA;
      --bg: #F2F4F6;
      --surface: #FFFFFF;
      --border: #E5E8EB;
      --text-primary: #191F28;
      --text-secondary: #6B7684;
      --text-tertiary: #B0B8C1;
      --red: #F04452;
      --green: #00C073;
      --yellow: #F5A623;
      --sidebar-w: 240px;
      --radius: 16px;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── 사이드바 ── */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    .sidebar-brand {
      padding: 28px 24px 20px;
    }
    .sidebar-brand .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .sidebar-brand .logo-icon {
      width: 36px; height: 36px;
      background: var(--toss-blue);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 18px;
    }
    .sidebar-brand .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .sidebar-brand .logo-sub {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: 46px;
    }

    .sidebar-nav { padding: 8px 12px; flex: 1; }
    .nav-item { list-style: none; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all .15s;
      cursor: pointer;
    }
    .nav-link i { font-size: 17px; }
    .nav-link:hover { background: var(--bg); color: var(--text-primary); }
    .nav-link.active {
      background: var(--toss-blue-light);
      color: var(--toss-blue);
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer .version {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* ── 메인 콘텐츠 ── */
    #main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-time {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .content {
      padding: 32px;
      max-width: 1200px;
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .card-header {
      padding: 20px 24px 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .card-body { padding: 20px 24px; }

    /* ── 버튼 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      text-decoration: none;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--toss-blue);
      color: #fff;
    }
    .btn-primary:hover { background: var(--toss-blue-dark); }
    .btn-secondary {
      background: var(--bg);
      color: var(--text-primary);
    }
    .btn-secondary:hover { background: #E5E8EB; }
    .btn-danger {
      background: #FFF0F1;
      color: var(--red);
    }
    .btn-danger:hover { background: #FFD9DC; }
    .btn-success {
      background: #E8FAF3;
      color: var(--green);
    }
    .btn-success:hover { background: #C2F0DB; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── 배지 ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-blue   { background: var(--toss-blue-light); color: var(--toss-blue); }
    .badge-green  { background: #E8FAF3; color: var(--green); }
    .badge-gray   { background: var(--bg); color: var(--text-secondary); }
    .badge-red    { background: #FFF0F1; color: var(--red); }

    /* ── 입력 폼 ── */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--surface);
      transition: border-color .15s;
      outline: none;
    }
    .form-control:focus { border-color: var(--toss-blue); }
    .form-control::placeholder { color: var(--text-tertiary); }
    .form-hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ── 구분선 ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    /* ── 로그 패널 ── */
    #log-panel {
      position: fixed;
      bottom: 0;
      left: var(--sidebar-w);
      right: 0;
      height: 240px;
      background: #0D1117;
      border-top: 1px solid #30363D;
      z-index: 200;
      display: none;
      flex-direction: column;
      border-radius: 16px 16px 0 0;
    }
    #log-panel.show { display: flex; }
    .log-header {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #21262D;
      flex-shrink: 0;
    }
    .log-header-title {
      font-size: 13px;
      font-weight: 600;
      color: #8B949E;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .log-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }
    #log-output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.7;
    }
    .log-INFO    { color: #8B949E; }
    .log-WARNING { color: #E3B341; }
    .log-ERROR   { color: #F85149; }
    .log-line { display: block; }

    /* ── 토스트 알림 ── */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast-item {
      background: var(--text-primary);
      color: #fff;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 768px) {
      #sidebar { display: none; }
      #main { margin-left: 0; }
      #log-panel { left: 0; }
      .content { padding: 20px 16px; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<!-- 사이드바 -->
<aside id="sidebar">
  <div class="sidebar-brand">
    <div class="logo">
      <div class="logo-icon"><i class="bi bi-shield-check"></i></div>
      <span class="logo-text">안전 뉴스레터</span>
    </div>
    <span class="logo-sub">건설안전 자동 발송 시스템</span>
  </div>

  <ul class="sidebar-nav">
    <li class="nav-item">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
        <i class="bi bi-grid-1x2"></i> 대시보드
      </a>
    </li>
    <li class="nav-item">
      <a href="/settings" class="nav-link {% if request.path == '/settings' %}active{% endif %}">
        <i class="bi bi-sliders"></i> 설정
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <p class="version">v1.0.0 · 건설안전 뉴스레터</p>
  </div>
</aside>

<!-- 메인 -->
<div id="main">
  <header class="topbar">
    <span class="topbar-title">{% block page_title %}{% endblock %}</span>
    <div class="topbar-right">
      <span class="topbar-time" id="clock"></span>
    </div>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- 로그 패널 -->
<div id="log-panel">
  <div class="log-header">
    <div class="log-header-title">
      <span class="log-dot" id="log-dot"></span>
      실시간 로그
    </div>
    <button class="btn btn-sm btn-secondary" onclick="toggleLogPanel(false)"
            style="padding:4px 12px;font-size:12px;">닫기</button>
  </div>
  <div id="log-output"></div>
</div>

<!-- 토스트 컨테이너 -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
  // 시계
  const clockEl = document.getElementById('clock');
  function updateClock() {
    const d = new Date();
    clockEl.textContent = d.toLocaleString('ko-KR', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // 토스트
  function showToast(msg, icon = '✓') {
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = 'toast-item';
    el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // 로그 패널
  let logEs = null;
  function toggleLogPanel(show) {
    const panel = document.getElementById('log-panel');
    if (show === undefined) show = !panel.classList.contains('show');
    panel.classList.toggle('show', show);
    if (show && !logEs) startLogStream();
  }
  function startLogStream() {
    if (logEs) return;
    logEs = new EventSource('/api/logs');
    logEs.onmessage = (e) => {
      const rec = JSON.parse(e.data);
      const out = document.getElementById('log-output');
      const line = document.createElement('span');
      line.className = 'log-line log-' + rec.level;
      line.textContent = rec.msg;
      out.appendChild(line);
      out.scrollTop = out.scrollHeight;
    };
    logEs.onerror = () => { logEs.close(); logEs = null; };
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
